<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-body">

          <h3 class="mb-3 text-center">Login</h3>

          @if (loading) { <div class="alert alert-info py-2">Validando credenciais…</div> }
          @if (erro)    { <div class="alert alert-danger py-2">{{ erro }}</div> }
          @if (ok)      { <div class="alert alert-success py-2">{{ ok }}</div> }

          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input
              class="form-control"
              type="email"
              placeholder="seu@email.com"
              [(ngModel)]="email"
              [disabled]="loading"
              (keyup.enter)="entrar()"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input
              class="form-control"
              type="password"
              placeholder="••••••••"
              [(ngModel)]="senha"
              [disabled]="loading"
              (keyup.enter)="entrar()"
            />
          </div>

          <button
            class="btn btn-primary w-100"
            (click)="entrar()"
            [disabled]="loading || !email || !senha"
          >
            @if (loading) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            }
            Entrar
          </button>

          <div class="text-center mt-3">
            <a class="small" routerLink="/recuperar-senha">Esqueceu a senha?</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
