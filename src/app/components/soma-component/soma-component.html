<h2 class="mb-3">Soma</h2>
<div class="row g-2 align-items-center mb-3">
  <div class="col-sm-3">
    <input type="number" class="form-control" name="n1" [(ngModel)]="n1" placeholder="Número 1">
  </div>
  <div class="col-sm-3">
    <input type="number" class="form-control" name="n2" [(ngModel)]="n2" placeholder="Número 2">
  </div>
  <div class="col-auto">
    <button class="btn btn-success" type="button" (click)="calcular()">Somar</button>
    <button class="btn btn-outline-secondary ms-2" type="button" (click)="limpar()">Limpar</button>
  </div>
</div>

@if (resultado !== null) {
  <div class="alert alert-secondary">Resultado: <strong>{{ resultado }}</strong></div>
}

<hr class="my-4">

<h3 class="mb-3">Mensagem</h3>
<div class="row g-2 align-items-center mb-3">
  <div class="col-sm-6 col-md-4">
    <input type="text" class="form-control" name="texto" [(ngModel)]="texto" placeholder="Digite uma mensagem">
  </div>
  <div class="col-auto">
    <button class="btn btn-primary" type="button" (click)="enviar()">Enviar</button>
  </div>
</div>

@if (mensagem) {
  <div class="alert alert-info">Você digitou: <strong>{{ mensagem }}</strong></div>
}
