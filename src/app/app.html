<mat-toolbar color="primary" class="app-toolbar">
  <div class="toolbar-container">
    <a class="brand" routerLink="/">Meu App</a>
  <!-- acompanha o estado da rota.routerLinkActive -->
  <!-- #rlaHome="routerLinkActive" pega a diretiva para usar isActive -->
  <!-- [routerLinkActiveOptions]="{ exact:true }" evita que “Home” fique ativo em rotas como   -->
  <nav mat-tab-nav-bar class="nav">
      <a mat-tab-link
         routerLink="/"
         #rlaHome="routerLinkActive"
         acompanha o estado da rota.
         routerLinkActive
         [routerLinkActiveOptions]="{ exact:true }"
         [active]="rlaHome.isActive">
        Home
      </a>

      <a mat-tab-link
         routerLink="/produtos"
         #rlaProd="routerLinkActive"
         routerLinkActive
         [routerLinkActiveOptions]="{ exact:true }"
         [active]="rlaProd.isActive">
        Produtos
      </a>

      <a mat-tab-link
         routerLink="/soma"
         #rlaSoma="routerLinkActive"
         routerLinkActive
         [routerLinkActiveOptions]="{ exact:true }"
         [active]="rlaSoma.isActive">
        Soma
      </a>
    </nav>
  </div>
</mat-toolbar>

<main class="page-container">
  <router-outlet></router-outlet>
</main>
